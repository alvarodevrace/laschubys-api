version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    reviewers:
      - alvarodevrace
    groups:
      patch-minor-deps:
        update-types:
          - "patch"
          - "minor"
    ignore:
      # No migraciones mayores automáticas (ej. TypeScript 5 → 6/7, @types/node 22 → 26).
      # Las migraciones mayores se planifican manualmente antes de producción.
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
